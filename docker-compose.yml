services:
  postgres:
    image: postgres:16-alpine
    container_name: html2pdf-pro-postgres
    environment:
      POSTGRES_DB: html2pdf_pro
      POSTGRES_USER: html2pdf
      POSTGRES_PASSWORD: html2pdf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U html2pdf -d html2pdf_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: html2pdf-pro-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

